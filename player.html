
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>El Impostor – Jugador (ULTRA SAFE)</title>
  <style>
    :root{ --bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#94a3b8; --primary:#0ea5e9; --accent:#22c55e; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{display:flex;align-items:center;gap:.75rem;padding:1rem;border-bottom:1px solid #1f2937;position:sticky;top:0;background:rgba(15,23,42,.8);backdrop-filter:blur(6px)}
    header h1{font-size:1.05rem;margin:0}
    main{max-width:720px;margin:0 auto;padding:1rem}
    .card{background:var(--card);border:1px solid #1f2937;border-radius:12px;padding:1rem;margin:1rem 0}
    .pill{display:inline-block;padding:.15rem .5rem;border-radius:999px;background:#0b1220;border:1px solid #1f2937;color:#cbd5e1;font-size:.75rem}
    .danger{color:#ef4444}.success{color:#22c55e}
  </style>
</head>
<body>
  <header>
    <h1>El Impostor – <span class="muted small">Jugador · ULTRA SAFE v4.2</span></h1>
  </header>
  <main>
    <div class="card">
      <h2 id="nombre">Jugador</h2>
      <p>Tu rol en esta ronda:</p>
      <p id="rol" class="pill"></p>
      <div style="height:.5rem"></div>
      <h3>Tema</h3>
      <p id="tema" style="font-size:1.1rem"></p>
      <p class="muted small">Si sos impostor, jugás a ciegas: no ves el tema. Improvisá con confianza 😎</p>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const name = params.get('name') || 'Jugador';
    const role = params.get('role') || 'Tripulante';
    const topic = params.get('topic') || '';
    document.getElementById('nombre').textContent = name;
    const rolEl = document.getElementById('rol');
    rolEl.textContent = role; rolEl.classList.add(role==='Impostor' ? 'danger' : 'success');
    document.getElementById('tema').textContent = (topic && topic.trim()!== '') ? topic : '(Sin tema asignado)';
  </script>
</body>
</html>
